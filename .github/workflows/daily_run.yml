# .github/workflows/daily_run.yml
# MaverickPICKS — Full Automated Pipeline
#
# Schedule (IST = UTC+5:30):
#   Mon & Wed 6:00 AM IST (00:30 UTC) → main_v3 scan
#   Daily     3:45 PM IST (10:15 UTC) → pattern + H&S scan
#   Daily     4:15 PM IST (10:45 UTC) → unified tracker + dashboards
#
# Dashboards:
#   https://htmlpreview.github.io/?https://raw.githubusercontent.com/Maverickpicks/MaverickPICKSPatterns/main/dashboard_maverick.html
#   https://htmlpreview.github.io/?https://raw.githubusercontent.com/Maverickpicks/MaverickPICKSPatterns/main/dashboard_patterns.html

name: MaverickPICKS Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '30 0 * * 1,3'    # main_v3: Mon & Wed 6:00 AM IST
    - cron: '15 10 * * 1-5'   # pattern scan: daily 3:45 PM IST
    - cron: '45 10 * * 1-5'   # tracker: daily 4:15 PM IST

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Which job to run?'
        required: true
        default: 'tracker_only'
        type: choice
        options:
          - tracker_only
          - pattern_scan
          - main_v3_scan
          - all

jobs:

  # ── JOB 1: main_v3 scan — Mon & Wed 6:00 AM IST ────────────────────────────
  main_v3_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.run_mode == 'main_v3_scan' ||
        github.event.inputs.run_mode == 'all')) ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '30 0 * * 1,3')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify pandas_ta shim
        run: python -c "import pandas_ta; print('pandas_ta shim OK — using built-in replacement')"

      - name: Run main_v3
        run: |
          echo "main_v3 scan — $(TZ='Asia/Kolkata' date)"
          python main_v3.py

      - name: Import picks into unified tracker
        run: |
          python unified_tracker.py \
            --import_maverick MaverickPICKS_Top10_Report.xlsx

      - name: Commit results
        run: |
          git config user.name  "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add MaverickPICKS_Top10_Report.xlsx unified_watchlist.json \
                  dashboard_maverick.html dashboard_patterns.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "main_v3 — $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: main-v3-${{ github.run_number }}
          path: MaverickPICKS_Top10_Report.xlsx
          retention-days: 30


  # ── JOB 2: Pattern + H&S scan — daily 3:45 PM IST ──────────────────────────
  pattern_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.run_mode == 'pattern_scan' ||
        github.event.inputs.run_mode == 'all')) ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '15 10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check trading day
        run: |
          python3 -c "
          from datetime import datetime, timezone, timedelta
          IST = timezone(timedelta(hours=5, minutes=30))
          now = datetime.now(IST)
          print(f'IST: {now.strftime(\"%d-%b-%Y %H:%M IST\")}')
          print(f'Day: {now.strftime(\"%A\")}')
          "

      - name: Run Murphy pattern scanner
        run: |
          python pattern_detector_v2.py \
            --csv_file NIFTY500_MASTER.csv \
            --lookback 90 \
            --min_score 50 \
            --workers 4 \
            --out_csv todays_picks.csv

      - name: Run H&S scanner
        run: |
          python hs_runner.py --min_quality 40 --workers 3 || \
            echo "H&S scan failed or no patterns found"

      - name: Import picks into unified tracker
        run: |
          CMD="python unified_tracker.py --import_patterns todays_picks.csv"
          if [ -f hs_watchlist.csv ]; then
            CMD="$CMD --import_hs hs_watchlist.csv"
          fi
          eval $CMD

      - name: Commit results
        run: |
          git config user.name  "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add todays_picks.csv unified_watchlist.json \
                  dashboard_maverick.html dashboard_patterns.html 2>/dev/null || true
          git add hs_watchlist.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Pattern scan — $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patterns-${{ github.run_number }}
          path: |
            todays_picks.csv
            hs_watchlist.csv
            unified_watchlist.json
          retention-days: 30


  # ── JOB 3: Unified tracker check — daily 4:15 PM IST ───────────────────────
  tracker_check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.run_mode == 'tracker_only' ||
        github.event.inputs.run_mode == 'all')) ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '45 10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unified tracker
        run: python unified_tracker.py --check

      - name: Show dashboard URLs
        run: |
          REPO="${{ github.repository }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  MaverickPICKS Dashboard:"
          echo "  https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/main/dashboard_maverick.html"
          echo ""
          echo "  Patterns Dashboard:"
          echo "  https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/main/dashboard_patterns.html"
          echo ""
          echo "  Performance Dashboard:"
          echo "  https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/main/dashboard_performance.html"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run performance logger
        run: python performance_logger.py

      - name: Commit dashboards
        run: |
          git config user.name  "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add unified_watchlist.json performance_history.json \
                  dashboard_maverick.html dashboard_patterns.html \
                  dashboard_performance.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Tracker — $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-${{ github.run_number }}
          path: |
            unified_watchlist.json
            dashboard_maverick.html
            dashboard_patterns.html
          retention-days: 30
