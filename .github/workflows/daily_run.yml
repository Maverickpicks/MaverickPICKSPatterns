# .github/workflows/daily_run.yml
#
# MaverickPICKS — Full Automated Pipeline
# =========================================
#
# Schedule (all times IST = UTC+5:30):
#   Mon & Wed  6:00 AM IST  (00:30 UTC Mon/Wed) → main_v3 scan
#   Daily      3:45 PM IST  (10:15 UTC)          → pattern + H&S scan
#   Daily      4:15 PM IST  (10:45 UTC)          → unified tracker + dashboards
#
# Dashboard URLs (bookmark these):
#   https://htmlpreview.github.io/?https://raw.githubusercontent.com/Maverickpicks/MaverickPICKS/main/dashboard_maverick.html
#   https://htmlpreview.github.io/?https://raw.githubusercontent.com/Maverickpicks/MaverickPICKS/main/dashboard_patterns.html

name: MaverickPICKS Pipeline

on:
  schedule:
    - cron: '30 0 * * 1,3'      # main_v3: Mon & Wed 6:00 AM IST
    - cron: '15 10 * * 1-5'     # pattern scan: daily 3:45 PM IST
    - cron: '45 10 * * 1-5'     # tracker: daily 4:15 PM IST

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Which job to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - main_v3_scan
          - pattern_scan
          - tracker_only

jobs:

  # ── JOB 1: main_v3 scan — Mon & Wed 6:00 AM IST ──────────────────────────
  main_v3_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.run_mode == 'main_v3_scan' ||
        github.event.inputs.run_mode == 'all')) ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '30 0 * * 1,3')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements.txt

      - name: Run main_v3
        run: |
          echo "main_v3 scan — $(TZ='Asia/Kolkata' date)"
          python main_v3.py

      - name: Import picks into unified tracker
        run: python unified_tracker.py --import_maverick MaverickPICKS_Top10_Report.xlsx

      - name: Commit
        run: |
          git config user.name "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git add MaverickPICKS_Top10_Report.xlsx unified_watchlist.json \
                  dashboard_maverick.html dashboard_patterns.html 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "main_v3 — $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')" && git push)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: main-v3-${{ github.run_number }}
          path: MaverickPICKS_Top10_Report.xlsx
          retention-days: 30


  # ── JOB 2: Pattern + H&S scan — daily 3:45 PM IST ───────────────────────
  pattern_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.run_mode == 'pattern_scan' ||
        github.event.inputs.run_mode == 'all')) ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '15 10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements.txt

      - name: Run Murphy pattern scanner
        run: |
          python pattern_detector_v2.py \
            --csv_file NIFTY500_MASTER.csv \
            --lookback 90 --min_score 50 --workers 4 \
            --out_csv todays_picks.csv

      - name: Run H&S scanner
        run: python hs_runner.py 2>/dev/null || echo "hs_runner.py not found — skipping"

      - name: Import picks into unified tracker
        run: |
          CMD="python unified_tracker.py --import_patterns todays_picks.csv"
          [ -f hs_watchlist.csv ] && CMD="$CMD --import_hs hs_watchlist.csv"
          eval $CMD

      - name: Commit
        run: |
          git config user.name "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add todays_picks.csv hs_watchlist.csv unified_watchlist.json \
                  dashboard_maverick.html dashboard_patterns.html 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Pattern scan — $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')" && git push)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patterns-${{ github.run_number }}
          path: |
            todays_picks.csv
            hs_watchlist.csv
            unified_watchlist.json
          retention-days: 30


  # ── JOB 3: Unified tracker check — daily 4:15 PM IST ─────────────────────
  tracker_check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.run_mode == 'tracker_only' ||
        github.event.inputs.run_mode == 'all')) ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '45 10 * * 1-5')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements.txt

      - name: Run unified tracker
        run: python unified_tracker.py --check

      - name: Print dashboard URLs
        run: |
          REPO="${{ github.repository }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  MaverickPICKS Dashboard:"
          echo "  https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/main/dashboard_maverick.html"
          echo ""
          echo "  Patterns Dashboard:"
          echo "  https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/main/dashboard_patterns.html"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Commit dashboards
        run: |
          git config user.name "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add unified_watchlist.json dashboard_maverick.html dashboard_patterns.html 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Tracker — $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')" && git push)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-${{ github.run_number }}
          path: |
            unified_watchlist.json
            dashboard_maverick.html
            dashboard_patterns.html
          retention-days: 30
