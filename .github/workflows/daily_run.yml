name: MaverickPICKS

permissions:
  contents: write

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 3:45 PM IST daily
  workflow_dispatch:
    inputs:
      skip_scan:
        description: 'Skip the scanner? (yes = tracker only, ~2 min)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        if: github.event.inputs.skip_scan != 'yes'
        run: |
          python maverick_scanner.py --min_score 40 --workers 4
          echo "scan_results.csv: $(wc -l < scan_results.csv) rows"

      - name: Run tracker
        run: python maverick_tracker.py

      - name: Commit
        run: |
          git config user.name  "MaverickPICKS Bot"
          git config user.email "maverick@noreply.github.com"
          git pull --rebase origin main 2>/dev/null || true
          git add -f scan_results.csv watchlist.json performance_history.json \
                  dashboard_picks.html dashboard_tracker.html 2>/dev/null || true
          echo "Staging:"
          git diff --staged --name-only
          git diff --staged --quiet || \
            (git commit -m "MaverickPICKS $(TZ='Asia/Kolkata' date '+%d-%b-%Y %H:%M IST')" \
             && git push && echo "Pushed OK")

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output-${{ github.run_number }}
          path: |
            scan_results.csv
            watchlist.json
            dashboard_picks.html
            dashboard_tracker.html
          retention-days: 30
